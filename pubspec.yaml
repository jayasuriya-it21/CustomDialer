name: google_dialer
description: "A new Flutter project."
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ^3.11.1


dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  record: ^6.2.0
  uuid: ^4.5.3
  shared_preferences: ^2.5.5
  flutter_contacts: ^2.0.2
  url_launcher: ^6.3.2
  intl: ^0.20.2
  just_audio: ^0.9.43
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/apple-phone.png"
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "assets/apple-phone.png"
